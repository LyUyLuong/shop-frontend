name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-ci:
    name: Lint, test, and build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    concurrency:
      group: frontend-ci-${{ github.ref }}
      cancel-in-progress: true

    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate production API base URL
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${VITE_API_BASE_URL}" ]]; then
            echo "::error::Missing repository variable VITE_API_BASE_URL"
            exit 1
          fi

          if [[ "${VITE_API_BASE_URL}" != https://* ]]; then
            echo "::error::VITE_API_BASE_URL must use HTTPS"
            exit 1
          fi

          case "${VITE_API_BASE_URL}" in
            *localhost*|*127.0.0.1*)
              echo "::error::VITE_API_BASE_URL must not point to a local backend"
              exit 1
              ;;
          esac

          echo "Frontend API target: ${VITE_API_BASE_URL}"

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

      - name: Verify production bundle
        shell: bash
        run: |
          set -euo pipefail

          test -f dist/index.html
          test -d dist/assets

          if grep -R --binary-files=without-match --fixed-strings \
            "http://localhost:8081" dist; then
            echo "::error::Production bundle contains the local backend URL"
            exit 1
          fi

          if ! grep -R --binary-files=without-match --fixed-strings \
            "${VITE_API_BASE_URL}" dist/assets >/dev/null; then
            echo "::error::Production API URL was not found in the built assets"
            exit 1
          fi

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shop-frontend-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
  frontend-deploy:
    name: Deploy frontend to S3 and CloudFront
    needs: frontend-ci
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    environment:
      name: production-frontend
      url: ${{ vars.FRONTEND_BASE_URL }}

    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write

    concurrency:
      group: shop-frontend-production
      cancel-in-progress: false

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      FRONTEND_DEPLOY_ROLE_ARN: ${{ vars.FRONTEND_DEPLOY_ROLE_ARN }}
      FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      FRONTEND_BASE_URL: ${{ vars.FRONTEND_BASE_URL }}

    steps:
      - name: Download verified frontend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: shop-frontend-dist-${{ github.sha }}
          path: dist
          digest-mismatch: error

      - name: Validate deployment inputs and artifact
        shell: bash
        run: |
          set -euo pipefail

          for variable in \
            AWS_REGION \
            FRONTEND_DEPLOY_ROLE_ARN \
            FRONTEND_S3_BUCKET \
            CLOUDFRONT_DISTRIBUTION_ID \
            FRONTEND_BASE_URL
          do
            if [[ -z "${!variable:-}" ]]; then
              echo "::error::Missing repository variable ${variable}"
              exit 1
            fi
          done

          if [[ "${FRONTEND_BASE_URL}" != https://* ]]; then
            echo "::error::FRONTEND_BASE_URL must use HTTPS"
            exit 1
          fi

          if [[ "${FRONTEND_BASE_URL}" == */ ]]; then
            echo "::error::FRONTEND_BASE_URL must not end with a slash"
            exit 1
          fi

          test -f dist/index.html
          test -d dist/assets
          find dist -maxdepth 2 -type f -print

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ env.FRONTEND_DEPLOY_ROLE_ARN }}
          role-session-name: shop-frontend-${{ github.run_id }}
          role-duration-seconds: 1800
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: "558891026882"
          unset-current-credentials: true

      - name: Verify assumed AWS identity
        shell: bash
        run: |
          set -euo pipefail

          CALLER_ARN="$(aws sts get-caller-identity --query Arn --output text)"
          echo "AWS caller: ${CALLER_ARN}"

          case "${CALLER_ARN}" in
            arn:aws:sts::558891026882:assumed-role/GitHubActionsShopFrontendDeployRole/*)
              ;;
            *)
              echo "::error::Unexpected AWS caller identity"
              exit 1
              ;;
          esac

      - name: Upload immutable hashed assets
        shell: bash
        run: |
          set -euo pipefail

          aws s3 cp \
            dist/assets/ \
            "s3://${FRONTEND_S3_BUCKET}/assets/" \
            --recursive \
            --cache-control "public,max-age=31536000,immutable" \
            --only-show-errors

      - name: Upload stable static files
        shell: bash
        run: |
          set -euo pipefail

          aws s3 cp \
            dist/ \
            "s3://${FRONTEND_S3_BUCKET}/" \
            --recursive \
            --exclude "assets/*" \
            --exclude "index.html" \
            --cache-control "public,max-age=300,must-revalidate" \
            --only-show-errors

      - name: Upload index last
        shell: bash
        run: |
          set -euo pipefail

          aws s3 cp \
            dist/index.html \
            "s3://${FRONTEND_S3_BUCKET}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache,max-age=0,must-revalidate" \
            --only-show-errors

      - name: Invalidate CloudFront entry files
        id: invalidate
        shell: bash
        run: |
          set -euo pipefail

          INVALIDATION_ID="$(
            aws cloudfront create-invalidation \
              --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
              --paths "/" "/index.html" "/favicon.svg" "/icons.svg" \
              --query "Invalidation.Id" \
              --output text
          )"

          echo "invalidation-id=${INVALIDATION_ID}" >> "${GITHUB_OUTPUT}"

          aws cloudfront wait invalidation-completed \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --id "${INVALIDATION_ID}"

      - name: Smoke test deployed frontend and API
        shell: bash
        run: |
          set -euo pipefail

          EXPECTED_ASSET="$(
            grep -oE '/assets/[^"]+\.js' dist/index.html |
              sed -n '1p'
          )"

          test -n "${EXPECTED_ASSET}"

          for route in "/" "/products" "/login" "/admin/products"
          do
            RESPONSE_FILE="$(mktemp)"

            curl \
              --fail \
              --silent \
              --show-error \
              --retry 5 \
              --retry-delay 3 \
              --retry-all-errors \
              "${FRONTEND_BASE_URL}${route}" \
              --output "${RESPONSE_FILE}"

            grep -Fq "${EXPECTED_ASSET}" "${RESPONSE_FILE}"
            rm -f "${RESPONSE_FILE}"
          done

          curl \
            --fail \
            --silent \
            --show-error \
            --retry 5 \
            --retry-delay 3 \
            --retry-all-errors \
            "${FRONTEND_BASE_URL}${EXPECTED_ASSET}" \
            --output /dev/null

          API_RESPONSE="$(
            curl \
              --fail \
              --silent \
              --show-error \
              --retry 5 \
              --retry-delay 3 \
              --retry-all-errors \
              "${FRONTEND_BASE_URL}/api/v1/products?page=0&size=1"
          )"

          grep -Fq '"success":true' <<< "${API_RESPONSE}"

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Frontend deployment"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Bucket: \`${FRONTEND_S3_BUCKET}\`"
            echo "- URL: ${FRONTEND_BASE_URL}"
            echo "- CloudFront invalidation: \`${{ steps.invalidate.outputs.invalidation-id }}\`"
            echo "- Result: success"
          } >> "${GITHUB_STEP_SUMMARY}"
