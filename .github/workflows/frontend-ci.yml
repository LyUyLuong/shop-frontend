name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      asset_retention_mode:
        description: Plan cleanup only, or apply a guarded soft delete after deployment
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - apply

permissions:
  contents: read

jobs:
  frontend-ci:
    name: Lint, test, and build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    concurrency:
      group: frontend-ci-${{ github.ref }}
      cancel-in-progress: true

    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate production API base URL
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${VITE_API_BASE_URL}" ]]; then
            echo "::error::Missing repository variable VITE_API_BASE_URL"
            exit 1
          fi

          if [[ "${VITE_API_BASE_URL}" != https://* ]]; then
            echo "::error::VITE_API_BASE_URL must use HTTPS"
            exit 1
          fi

          case "${VITE_API_BASE_URL}" in
            *localhost*|*127.0.0.1*)
              echo "::error::VITE_API_BASE_URL must not point to a local backend"
              exit 1
              ;;
          esac

          echo "Frontend API target: ${VITE_API_BASE_URL}"

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

      - name: Generate release asset manifest
        shell: bash
        run: |
          set -euo pipefail

          node scripts/deployment/create-release-manifest.mjs \
            --asset-directory dist/assets \
            --output dist/deployment/release-manifest.json \
            --release-id "${GITHUB_SHA}" \
            --commit-sha "${GITHUB_SHA}" \
            --created-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --source-ref "${GITHUB_REF}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"

      - name: Verify production bundle
        shell: bash
        run: |
          set -euo pipefail

          test -f dist/index.html
          test -d dist/assets
          test -f dist/deployment/release-manifest.json

          node scripts/deployment/validate-release-manifest.mjs \
            --manifest dist/deployment/release-manifest.json \
            --expected-release-id "${GITHUB_SHA}"

          if grep -R --binary-files=without-match --fixed-strings \
            "http://localhost:8081" dist; then
            echo "::error::Production bundle contains the local backend URL"
            exit 1
          fi

          if ! grep -R --binary-files=without-match --fixed-strings \
            "${VITE_API_BASE_URL}" dist/assets >/dev/null; then
            echo "::error::Production API URL was not found in the built assets"
            exit 1
          fi

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shop-frontend-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
  frontend-deploy:
    name: Deploy frontend to S3 and CloudFront
    needs: frontend-ci
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    environment:
      name: production-frontend
      url: ${{ vars.FRONTEND_BASE_URL }}

    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write

    concurrency:
      group: shop-frontend-production
      cancel-in-progress: false

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      FRONTEND_DEPLOY_ROLE_ARN: ${{ vars.FRONTEND_DEPLOY_ROLE_ARN }}
      FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      FRONTEND_BASE_URL: ${{ vars.FRONTEND_BASE_URL }}
      ASSET_RETENTION_MODE: ${{ (github.event_name == 'workflow_dispatch' && inputs.asset_retention_mode) || vars.FRONTEND_ASSET_RETENTION_MODE || 'dry-run' }}
      ASSET_RETENTION_KEEP_RELEASES: ${{ vars.FRONTEND_ASSET_RETENTION_KEEP_RELEASES || '3' }}
      ASSET_RETENTION_MINIMUM_AGE_HOURS: ${{ vars.FRONTEND_ASSET_RETENTION_MINIMUM_AGE_HOURS || '168' }}
      ASSET_RETENTION_MAXIMUM_DELETE_COUNT: ${{ vars.FRONTEND_ASSET_RETENTION_MAXIMUM_DELETE_COUNT || '25' }}

    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js for deployment scripts
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Download verified frontend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: shop-frontend-dist-${{ github.sha }}
          path: dist
          digest-mismatch: error

      - name: Validate deployment inputs and artifact
        shell: bash
        run: |
          set -euo pipefail

          for variable in \
            AWS_REGION \
            FRONTEND_DEPLOY_ROLE_ARN \
            FRONTEND_S3_BUCKET \
            CLOUDFRONT_DISTRIBUTION_ID \
            FRONTEND_BASE_URL \
            ASSET_RETENTION_MODE \
            ASSET_RETENTION_KEEP_RELEASES \
            ASSET_RETENTION_MINIMUM_AGE_HOURS \
            ASSET_RETENTION_MAXIMUM_DELETE_COUNT
          do
            if [[ -z "${!variable:-}" ]]; then
              echo "::error::Missing repository variable ${variable}"
              exit 1
            fi
          done

          if [[ "${FRONTEND_BASE_URL}" != https://* ]]; then
            echo "::error::FRONTEND_BASE_URL must use HTTPS"
            exit 1
          fi

          if [[ "${FRONTEND_BASE_URL}" == */ ]]; then
            echo "::error::FRONTEND_BASE_URL must not end with a slash"
            exit 1
          fi

          case "${ASSET_RETENTION_MODE}" in
            dry-run|apply)
              ;;
            *)
              echo "::error::ASSET_RETENTION_MODE must be dry-run or apply"
              exit 1
              ;;
          esac

          for variable in \
            ASSET_RETENTION_KEEP_RELEASES \
            ASSET_RETENTION_MINIMUM_AGE_HOURS \
            ASSET_RETENTION_MAXIMUM_DELETE_COUNT
          do
            if [[ ! "${!variable}" =~ ^[0-9]+$ ]]; then
              echo "::error::${variable} must be a non-negative integer"
              exit 1
            fi
          done

          if (( ASSET_RETENTION_KEEP_RELEASES < 1 )); then
            echo "::error::ASSET_RETENTION_KEEP_RELEASES must be at least 1"
            exit 1
          fi

          if (( ASSET_RETENTION_MAXIMUM_DELETE_COUNT < 1 )); then
            echo "::error::ASSET_RETENTION_MAXIMUM_DELETE_COUNT must be at least 1"
            exit 1
          fi

          test -f dist/index.html
          test -d dist/assets
          test -f dist/deployment/release-manifest.json

          node scripts/deployment/validate-release-manifest.mjs \
            --manifest dist/deployment/release-manifest.json \
            --expected-release-id "${GITHUB_SHA}"

          find dist -maxdepth 2 -type f -print

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ env.FRONTEND_DEPLOY_ROLE_ARN }}
          role-session-name: shop-frontend-${{ github.run_id }}
          role-duration-seconds: 1800
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: "558891026882"
          unset-current-credentials: true

      - name: Verify assumed AWS identity
        shell: bash
        run: |
          set -euo pipefail

          CALLER_ARN="$(aws sts get-caller-identity --query Arn --output text)"
          echo "AWS caller: ${CALLER_ARN}"

          case "${CALLER_ARN}" in
            arn:aws:sts::558891026882:assumed-role/GitHubActionsShopFrontendDeployRole/*)
              ;;
            *)
              echo "::error::Unexpected AWS caller identity"
              exit 1
              ;;
          esac

      - name: Verify S3 recovery guard
        shell: bash
        run: |
          set -euo pipefail

          command -v jq >/dev/null
          mkdir -p retention/recovery

          VERSIONING_STATUS="$(
            aws s3api get-bucket-versioning \
              --bucket "${FRONTEND_S3_BUCKET}" \
              --query "Status" \
              --output text
          )"

          if [[ "${VERSIONING_STATUS}" != "Enabled" ]]; then
            echo "::error::Frontend bucket versioning must be Enabled before retention can run"
            exit 1
          fi

          aws s3api get-bucket-lifecycle-configuration \
            --bucket "${FRONTEND_S3_BUCKET}" \
            --output json \
            > retention/recovery/lifecycle.json

          jq -e '
            any(
              .Rules[]?;
              .ID == "FrontendBucketRecoveryWindow" and
              .Status == "Enabled" and
              (.NoncurrentVersionExpiration.NoncurrentDays >= 30) and
              (.AbortIncompleteMultipartUpload.DaysAfterInitiation <= 7) and
              (.Expiration.ExpiredObjectDeleteMarker == true)
            )
          ' retention/recovery/lifecycle.json >/dev/null

          printf '{"versioningStatus":"%s"}\n' "${VERSIONING_STATUS}" \
            > retention/recovery/versioning.json

      - name: Bootstrap pre-retention assets once
        id: bootstrap
        shell: bash
        run: |
          set -euo pipefail

          command -v jq >/dev/null
          mkdir -p retention/bootstrap

          aws s3api list-objects-v2 \
            --bucket "${FRONTEND_S3_BUCKET}" \
            --prefix "assets/" \
            --output json \
            > retention/bootstrap/predeploy-assets.json

          aws s3api list-objects-v2 \
            --bucket "${FRONTEND_S3_BUCKET}" \
            --prefix "_deployments/releases/" \
            --output json \
            > retention/bootstrap/existing-manifests.json

          ASSET_COUNT="$(jq '(.Contents // []) | length' retention/bootstrap/predeploy-assets.json)"
          MANIFEST_COUNT="$(jq '(.Contents // []) | length' retention/bootstrap/existing-manifests.json)"

          echo "predeploy-asset-count=${ASSET_COUNT}" >> "${GITHUB_OUTPUT}"
          echo "existing-manifest-count=${MANIFEST_COUNT}" >> "${GITHUB_OUTPUT}"

          if (( MANIFEST_COUNT == 0 && ASSET_COUNT > 0 )); then
            BOOTSTRAP_TIMESTAMP="$(date -u +%Y%m%dT%H%M%SZ)"
            BOOTSTRAP_CREATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            BOOTSTRAP_RELEASE_ID="bootstrap-${BOOTSTRAP_TIMESTAMP}-${GITHUB_RUN_ID}"
            BOOTSTRAP_FILE="retention/bootstrap/${BOOTSTRAP_RELEASE_ID}.json"

            node scripts/deployment/create-bootstrap-manifest.mjs \
              --inventory retention/bootstrap/predeploy-assets.json \
              --output "${BOOTSTRAP_FILE}" \
              --release-id "${BOOTSTRAP_RELEASE_ID}" \
              --created-at "${BOOTSTRAP_CREATED_AT}"

            aws s3 cp \
              "${BOOTSTRAP_FILE}" \
              "s3://${FRONTEND_S3_BUCKET}/_deployments/releases/${BOOTSTRAP_RELEASE_ID}.json" \
              --content-type "application/json" \
              --cache-control "no-store" \
              --only-show-errors

            echo "created=true" >> "${GITHUB_OUTPUT}"
            echo "release-id=${BOOTSTRAP_RELEASE_ID}" >> "${GITHUB_OUTPUT}"
          else
            echo "created=false" >> "${GITHUB_OUTPUT}"
            echo "release-id=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upload immutable hashed assets
        shell: bash
        run: |
          set -euo pipefail

          aws s3 cp \
            dist/assets/ \
            "s3://${FRONTEND_S3_BUCKET}/assets/" \
            --recursive \
            --cache-control "public,max-age=31536000,immutable" \
            --only-show-errors

      - name: Upload stable static files
        shell: bash
        run: |
          set -euo pipefail

          aws s3 cp \
            dist/ \
            "s3://${FRONTEND_S3_BUCKET}/" \
            --recursive \
            --exclude "assets/*" \
            --exclude "deployment/*" \
            --exclude "index.html" \
            --cache-control "public,max-age=300,must-revalidate" \
            --only-show-errors

      - name: Upload index last
        shell: bash
        run: |
          set -euo pipefail

          aws s3 cp \
            dist/index.html \
            "s3://${FRONTEND_S3_BUCKET}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache,max-age=0,must-revalidate" \
            --only-show-errors

      - name: Invalidate CloudFront entry files
        id: invalidate
        shell: bash
        run: |
          set -euo pipefail

          INVALIDATION_ID="$(
            aws cloudfront create-invalidation \
              --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
              --paths "/" "/index.html" "/favicon.svg" "/icons.svg" \
              --query "Invalidation.Id" \
              --output text
          )"

          echo "invalidation-id=${INVALIDATION_ID}" >> "${GITHUB_OUTPUT}"

          aws cloudfront wait invalidation-completed \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --id "${INVALIDATION_ID}"

      - name: Smoke test every deployed asset and the API
        id: smoke
        shell: bash
        run: |
          set -euo pipefail

          command -v jq >/dev/null
          command -v sha256sum >/dev/null

          EXPECTED_ASSET="$(
            grep -oE '/assets/[^"]+\.js' dist/index.html |
              sed -n '1p'
          )"

          test -n "${EXPECTED_ASSET}"

          for route in "/" "/products" "/login" "/admin/products"
          do
            RESPONSE_FILE="$(mktemp)"

            curl \
              --fail \
              --silent \
              --show-error \
              --retry 5 \
              --retry-delay 3 \
              --retry-all-errors \
              "${FRONTEND_BASE_URL}${route}" \
              --output "${RESPONSE_FILE}"

            grep -Fq "${EXPECTED_ASSET}" "${RESPONSE_FILE}"
            rm -f "${RESPONSE_FILE}"
          done

          ASSET_COUNT=0

          while IFS=$'\t' read -r ASSET_KEY EXPECTED_SHA256
          do
            ASSET_FILE="$(mktemp)"

            curl \
              --fail \
              --silent \
              --show-error \
              --retry 5 \
              --retry-delay 3 \
              --retry-all-errors \
              "${FRONTEND_BASE_URL}/${ASSET_KEY}" \
              --output "${ASSET_FILE}"

            ACTUAL_SHA256="$(sha256sum "${ASSET_FILE}" | awk '{print $1}')"
            rm -f "${ASSET_FILE}"

            if [[ "${ACTUAL_SHA256}" != "${EXPECTED_SHA256}" ]]; then
              echo "::error::CloudFront asset digest mismatch for ${ASSET_KEY}"
              exit 1
            fi

            ASSET_COUNT=$((ASSET_COUNT + 1))
          done < <(
            jq -r \
              '.assets[] | [.key, .sha256] | @tsv' \
              dist/deployment/release-manifest.json
          )

          if (( ASSET_COUNT == 0 )); then
            echo "::error::Release manifest did not contain any assets"
            exit 1
          fi

          echo "asset-count=${ASSET_COUNT}" >> "${GITHUB_OUTPUT}"

          API_RESPONSE="$(
            curl \
              --fail \
              --silent \
              --show-error \
              --retry 5 \
              --retry-delay 3 \
              --retry-all-errors \
              "${FRONTEND_BASE_URL}/api/v1/products?page=0&size=1"
          )"

          grep -Fq '"success":true' <<< "${API_RESPONSE}"

      - name: Publish successful release manifest
        shell: bash
        run: |
          set -euo pipefail

          aws s3 cp \
            dist/deployment/release-manifest.json \
            "s3://${FRONTEND_S3_BUCKET}/_deployments/releases/${GITHUB_SHA}.json" \
            --content-type "application/json" \
            --cache-control "no-store" \
            --only-show-errors

      - name: Build guarded asset-retention plan
        id: retention-plan
        shell: bash
        run: |
          set -euo pipefail

          command -v jq >/dev/null
          mkdir -p retention/manifests retention/plan

          aws s3 sync \
            "s3://${FRONTEND_S3_BUCKET}/_deployments/releases/" \
            retention/manifests/ \
            --exclude "*" \
            --include "*.json" \
            --only-show-errors

          aws s3api list-objects-v2 \
            --bucket "${FRONTEND_S3_BUCKET}" \
            --prefix "assets/" \
            --output json \
            > retention/plan/current-assets.json

          node scripts/deployment/plan-asset-retention.mjs \
            --manifest-directory retention/manifests \
            --inventory retention/plan/current-assets.json \
            --output retention/plan/retention-plan.json \
            --current-release-id "${GITHUB_SHA}" \
            --keep-releases "${ASSET_RETENTION_KEEP_RELEASES}" \
            --minimum-age-hours "${ASSET_RETENTION_MINIMUM_AGE_HOURS}" \
            --maximum-delete-count "${ASSET_RETENTION_MAXIMUM_DELETE_COUNT}" \
            --now "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          jq . retention/plan/retention-plan.json

          SAFE_TO_APPLY="$(jq -r '.safeToApply' retention/plan/retention-plan.json)"
          CANDIDATE_COUNT="$(jq '.candidates | length' retention/plan/retention-plan.json)"
          DEFERRED_COUNT="$(jq '.deferred | length' retention/plan/retention-plan.json)"
          PROTECTED_COUNT="$(jq '.protectedAssets | length' retention/plan/retention-plan.json)"
          MANIFEST_COUNT="$(jq '.manifests.discoveredCount' retention/plan/retention-plan.json)"

          echo "safe-to-apply=${SAFE_TO_APPLY}" >> "${GITHUB_OUTPUT}"
          echo "candidate-count=${CANDIDATE_COUNT}" >> "${GITHUB_OUTPUT}"
          echo "deferred-count=${DEFERRED_COUNT}" >> "${GITHUB_OUTPUT}"
          echo "protected-count=${PROTECTED_COUNT}" >> "${GITHUB_OUTPUT}"
          echo "manifest-count=${MANIFEST_COUNT}" >> "${GITHUB_OUTPUT}"

          if [[ "${SAFE_TO_APPLY}" != "true" ]]; then
            echo "::error::Asset-retention safety checks failed"
            exit 1
          fi

      - name: Apply guarded asset retention
        id: retention-apply
        shell: bash
        run: |
          set -euo pipefail

          command -v jq >/dev/null
          DELETION_LOG="retention/plan/deletions.ndjson"
          CANDIDATE_COUNT="$(jq '.candidates | length' retention/plan/retention-plan.json)"
          DELETED_COUNT=0

          : > "${DELETION_LOG}"

          if [[ "${ASSET_RETENTION_MODE}" == "apply" ]]; then
            while IFS= read -r ASSET_KEY
            do
              if [[ ! "${ASSET_KEY}" =~ ^assets/[A-Za-z0-9][A-Za-z0-9._/-]*$ ]] || \
                [[ "${ASSET_KEY}" == *".."* ]] || \
                [[ "${ASSET_KEY}" == *"//"* ]]; then
                echo "::error::Refusing unsafe asset key: ${ASSET_KEY}"
                exit 1
              fi

              DELETE_RESPONSE="$(
                aws s3api delete-object \
                  --bucket "${FRONTEND_S3_BUCKET}" \
                  --key "${ASSET_KEY}" \
                  --output json
              )"

              if [[ "$(jq -r '.DeleteMarker // false' <<< "${DELETE_RESPONSE}")" != "true" ]]; then
                echo "::error::S3 did not return a recoverable delete marker for ${ASSET_KEY}"
                exit 1
              fi

              jq -cn \
                --arg key "${ASSET_KEY}" \
                --arg versionId "$(jq -r '.VersionId' <<< "${DELETE_RESPONSE}")" \
                '{key: $key, deleteMarker: true, versionId: $versionId}' \
                >> "${DELETION_LOG}"

              DELETED_COUNT=$((DELETED_COUNT + 1))
            done < <(jq -r '.candidates[].key' retention/plan/retention-plan.json)

            if (( DELETED_COUNT != CANDIDATE_COUNT )); then
              echo "::error::Deleted ${DELETED_COUNT} assets but planned ${CANDIDATE_COUNT}"
              exit 1
            fi
          else
            echo "Dry-run mode: ${CANDIDATE_COUNT} candidate assets were not deleted."
          fi

          echo "deleted-count=${DELETED_COUNT}" >> "${GITHUB_OUTPUT}"

      - name: Verify protected assets after retention
        id: retention-verify
        shell: bash
        run: |
          set -euo pipefail

          aws s3api list-objects-v2 \
            --bucket "${FRONTEND_S3_BUCKET}" \
            --prefix "assets/" \
            --output json \
            > retention/plan/post-retention-assets.json

          VERIFIED_COUNT=0

          while IFS= read -r ASSET_KEY
          do
            if ! jq -e \
              --arg key "${ASSET_KEY}" \
              'any((.Contents // [])[]; .Key == $key)' \
              retention/plan/post-retention-assets.json \
              >/dev/null; then
              echo "::error::Protected asset is missing from S3 after retention: ${ASSET_KEY}"
              exit 1
            fi

            curl \
              --fail \
              --silent \
              --show-error \
              --retry 5 \
              --retry-delay 3 \
              --retry-all-errors \
              "${FRONTEND_BASE_URL}/${ASSET_KEY}" \
              --output /dev/null

            VERIFIED_COUNT=$((VERIFIED_COUNT + 1))
          done < <(jq -r '.protectedAssets[].key' retention/plan/retention-plan.json)

          if (( VERIFIED_COUNT == 0 )); then
            echo "::error::No protected assets were verified"
            exit 1
          fi

          echo "verified-count=${VERIFIED_COUNT}" >> "${GITHUB_OUTPUT}"

      - name: Upload frontend retention evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shop-frontend-retention-${{ github.sha }}-${{ github.run_attempt }}
          path: retention/
          if-no-files-found: warn
          retention-days: 30

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Frontend deployment"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Bucket: \`${FRONTEND_S3_BUCKET}\`"
            echo "- URL: ${FRONTEND_BASE_URL}"
            echo "- CloudFront invalidation: \`${{ steps.invalidate.outputs.invalidation-id }}\`"
            echo "- Current release assets verified by SHA-256: \`${{ steps.smoke.outputs.asset-count }}\`"
            echo "- Bootstrap manifest created: \`${{ steps.bootstrap.outputs.created }}\`"
            echo "- Release manifests discovered: \`${{ steps.retention-plan.outputs.manifest-count }}\`"
            echo "- Protected asset keys verified after retention: \`${{ steps.retention-verify.outputs.verified-count }}\`"
            echo "- Retention mode: \`${ASSET_RETENTION_MODE}\`"
            echo "- Cleanup candidates: \`${{ steps.retention-plan.outputs.candidate-count }}\`"
            echo "- Deferred by minimum age: \`${{ steps.retention-plan.outputs.deferred-count }}\`"
            echo "- Soft-deleted with S3 delete markers: \`${{ steps.retention-apply.outputs.deleted-count }}\`"
            echo "- Result: success"
          } >> "${GITHUB_STEP_SUMMARY}"
