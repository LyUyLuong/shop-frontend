name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-ci:
    name: Lint, test, and build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    concurrency:
      group: frontend-ci-${{ github.ref }}
      cancel-in-progress: true

    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate production API base URL
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${VITE_API_BASE_URL}" ]]; then
            echo "::error::Missing repository variable VITE_API_BASE_URL"
            exit 1
          fi

          if [[ "${VITE_API_BASE_URL}" != https://* ]]; then
            echo "::error::VITE_API_BASE_URL must use HTTPS"
            exit 1
          fi

          case "${VITE_API_BASE_URL}" in
            *localhost*|*127.0.0.1*)
              echo "::error::VITE_API_BASE_URL must not point to a local backend"
              exit 1
              ;;
          esac

          echo "Frontend API target: ${VITE_API_BASE_URL}"

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

      - name: Verify production bundle
        shell: bash
        run: |
          set -euo pipefail

          test -f dist/index.html
          test -d dist/assets

          if grep -R --binary-files=without-match --fixed-strings \
            "http://localhost:8081" dist; then
            echo "::error::Production bundle contains the local backend URL"
            exit 1
          fi

          if ! grep -R --binary-files=without-match --fixed-strings \
            "${VITE_API_BASE_URL}" dist/assets >/dev/null; then
            echo "::error::Production API URL was not found in the built assets"
            exit 1
          fi

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shop-frontend-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
